<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ul(unordered list) tag</title>
</head>
<body>
  <h1>판매 중인 과일</h1>
  <ul type="square">
    <li>바나나</li>
    <ol type="I" start="6">
      <li>아침 먹기</li>
      <li>아침 먹기</li>
      <li>점심 먹기</li>
      <li>아침 먹기</li>
      <li>저녁 먹기</li>
      <li>아침 먹기</li>
    </ol>
    <li>사과</li>
    <li>수박</li>
  </ul>
</body>
</html>
