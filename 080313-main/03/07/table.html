<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>table</title>
  <!-- <style>
    table{
      border-collapse: collapse;
    }
    th, td{
      border: 1px solid #ccc;
      text-align: center;
    }
  </style> -->
</head>
<body>
  <!-- 테이블의 시작을 의미 -->
  <table border="1" align="center" width="500px">
    <tr>
      <td>1</td>
      <td>2</td>
      <td rowspan="2">3</td>
      <td>4</td>
      <td>5</td>
    </tr>
    <tr>
      <td>6</td>
      <td>7</td>
      
      <td>9</td>
      <td>10</td>
    </tr>
    <tr>
      <td rowspan="2" colspan="2">11</td>

      <td>13</td>
      <td rowspan="3">14</td>
      <td>15</td>
    </tr>
    <tr>


      <td>18</td>

      <td>20</td>
    </tr>
    <tr>
      <td>21</td>
      <td>22</td>
      <td>23</td>

      <td>25</td>
    </tr>
  </table>  
</body>
</html>
