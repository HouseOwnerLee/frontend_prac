<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 Property Basic</title>
    <style>
        .container{
            position: relative;
            width: 500px; height: 300px;
            border: 2px solid #333;
            padding: 20px;
        }
        .box{
            width:200px; height:60px;
            margin-bottom: 10px;
            background-color: #f0f0f0;
        }
        .static-box{
            position: static;
            top: 50px;
            left: 50px;
        }
        .relative-box{
            position: relative;
            top: 15px;
            left: 30px;
            background-color: #ffeaa7;
        }
        .absolute-box{        
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background-color: #ff0000;
            color: white;
        }
        .fixed-box{
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px; height: 50px;
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box static-box">일반 글자</div>
        <div class="box relative-box">조금 이동한 상자</div>
        <div class="badge absolute-box">NEW</div>
        <div class="quick-menu fixed-box">TOP</div>
    </div>
</body>
</html>
