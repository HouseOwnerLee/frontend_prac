<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p align="center">회원 가입 양식</p>
    <form action="#" enctype="multipart/form-data">
        <table border="1" align="center">
            <tr>
                <td>아이디</td>
                <td width="450"><input type="text" pattern="[a-zA-Z0-9]+" minlength="6" maxlength="10" name="id" size="10" required>(최소6~최대10, 숫자와 알파벳만 사용)</td>
            </tr>
            <tr>
                <td>비밀번호</td>
                <td><input type="password" pattern="[a-zA-Z0-9]+" minlength="6" maxlength="10" name="pw" size="10" required>(최소6~최대10, 숫자와 알파벳만 사용)</td>
            </tr>
            <tr>
                <td width="110">비밀번호 확인</td>
                <td><input type="password" pattern="[a-zA-Z0-9]+" minlength="6" maxlength="10" name="pw_confirm" size="10" required>(최소6~최대10, 숫자와 알파벳만 사용)</td>
            </tr>
            <tr>
                <td>주민번호</td>
                <td><input type="text" pattern="[0-9]+" maxlength="6" name="ssn" size="6" required>-<input type="password" pattern="[0-9]+" maxlength="7" name="ssn_hidden" size="7" required></td>
            </tr>
            <tr>
                <td>성별</td>
                <td>
                    <input type="radio" name="gender" value="male" required> 남자
                    <input type="radio" name="gender" value="female" required> 여자
                </td>
            </tr>
            <tr>
                <td>전화번호</td>
                <td><input type="tel" pattern="[0-9]+" name="phone1" maxlength="3" size="3" required>-<input type="tel" pattern="[0-9]+" name="phone2" maxlength="4" size="4" required>-<input type="tel" pattern="[0-9]+" name="phone3" maxlength="4" size="4" required></td>
            </tr>
            <tr>
                <td>이메일</td>
                <td><input type="text" name="email" size="15" required>@
                    <select name="email_domain" required>
                        <optgroup>
                            <option disabled hidden selected>메일주소선택</option>
                            <option value="naver.com">naver.com</option>
                            <option value="gmail.com">gmail.com</option>
                            <option value="daum.net">daum.net</option>
                            <option value="nate.com">nate.com</option>
                        </optgroup>
                    </select>
                </td>
            </tr>
            <tr>
                <td>취미</td>
                <td>
                    <input type="checkbox" name="hobby" value="hiking"> 등산
                    <input type="checkbox" name="hobby" value="read"> 독서
                    <input type="checkbox" name="hobby" value="ski"> 스키
                    <input type="checkbox" name="hobby" value="music"> 음악
                    <input type="checkbox" name="hobby" value="movie"> 영화
                </td>
            </tr>
            <tr>
                <td>자기소개</td>
                <td><textarea name="intro" rows="5" cols="45" required></textarea></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <button type="submit">입력</button>
                    <button type="reset">취소</button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
